<!DOCTYPE html>
<html>
<head>
    <title>AI Voice Agent</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
        .chat {
            border: 1px solid #ccc;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            text-align: left;
        }
        .message {
            margin: 10px 0;
            padding: 8px;
            border-radius: 8px;
        }
        .user {
            background: #e3f2fd;
            text-align: right;
        }
        .agent {
            background: #f1f1f1;
            text-align: left;
        }
    </style>
</head>
<body>

    <h2>AI Agent</h2>
    <p id="status">Idle</p>

    <input id="query" placeholder="Ask something..." />
    <br>
    <button onclick="startListening()">🎤 Speak</button>
    <button onclick="ask()">Send</button>
    <button onclick="clearChat()">Clear</button>

    <div id="chat" class="chat"></div>

    <script>
        let messages = [];

        // -------------------------
        // Speech Recognition Setup
        // -------------------------
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        let recognition = null;

        if (!SpeechRecognition) {
            alert("❌ Speech Recognition not supported (use Chrome)");
        } else {
            recognition = new SpeechRecognition();
            recognition.lang = "en-US";
            recognition.continuous = false;

            recognition.onstart = () => {
                document.getElementById("status").innerText = "🎤 Listening...";
            };

            recognition.onend = () => {
                document.getElementById("status").innerText = "Processing...";
            };

            recognition.onerror = (event) => {
                console.error("Speech error:", event.error);
                document.getElementById("status").innerText = "Error: " + event.error;
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById("query").value = transcript;
                document.getElementById("status").innerText = "Thinking...";
                ask();
            };
        }

        function startListening() {
            if (!recognition) {
                alert("Speech recognition not available");
                return;
            }

            try {
                recognition.start();
            } catch (e) {
                console.error("Start error:", e);
            }
        }

        // -------------------------
        // Ask API
        // -------------------------
        async function ask() {
            const query = document.getElementById("query").value;

            if (!query) return;

            addMessage("You: " + query, "user");
            document.getElementById("status").innerText = "Thinking...";

            const res = await fetch("http://127.0.0.1:8000/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query })
            });

            const data = await res.json();

            addMessage("Agent: " + data.response, "agent");

            document.getElementById("status").innerText = "🔊 Speaking...";
            speak(data.response);

            document.getElementById("query").value = "";
        }

        // -------------------------
        // Text-to-Speech
        // -------------------------
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "en-US";

            const voices = speechSynthesis.getVoices();

            if (voices.length > 0) {
                const preferred = voices.find(v => v.lang === "en-US");
                if (preferred) utterance.voice = preferred;
            }

            utterance.onend = () => {
                document.getElementById("status").innerText = "Idle";
            };

            speechSynthesis.speak(utterance);
        }

        // -------------------------
        // Chat UI
        // -------------------------
        function addMessage(text, sender) {
            const chat = document.getElementById("chat");

            const msg = document.createElement("div");
            msg.classList.add("message", sender);
            msg.innerText = text;

            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;

            messages.push({ text, sender });
            localStorage.setItem("chat_history", JSON.stringify(messages));
        }

        function clearChat() {
            localStorage.removeItem("chat_history");
            messages = [];
            document.getElementById("chat").innerHTML = "";
        }

        // -------------------------
        // Load history
        // -------------------------
        window.onload = function () {
            const saved = localStorage.getItem("chat_history");

            if (saved) {
                messages = JSON.parse(saved);

                messages.forEach(m => {
                    const msg = document.createElement("div");
                    msg.classList.add("message", m.sender);
                    msg.innerText = m.text;
                    document.getElementById("chat").appendChild(msg);
                });

                document.getElementById("chat").scrollTop =
                    document.getElementById("chat").scrollHeight;
            }
        };
    </script>

</body>
</html>
