<!DOCTYPE html>
<html>
<head>
    <title>AI Voice Agent</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
        .box {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

    <h2>AI Agent</h2>
    <p id="status">Idle</p>
    <input id="query" placeholder="Ask something..." />
    <br>
    <button onclick="startListening()">🎤 Speak</button>
    <button onclick="ask()">Send</button>

    <div class="box">
        <strong>You:</strong>
        <p id="userText"></p>

        <strong>Agent:</strong>
        <p id="responseText"></p>
    </div>

    <script>
        speechSynthesis.onvoiceschanged = () => {
            console.log("Voices loaded");
        };

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = "en-US";
        recognition.continuous = false;

        function startListening() {
            recognition.start();
        }

        recognition.onstart = function() {
            console.log("🎙️ Listening started");
            document.getElementById("status").innerText = "🎤 Listening...";
        };

        recognition.onend = function() {
            console.log("🛑 Listening ended");
            document.getElementById("status").innerText = "Processing...";
        };

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            document.getElementById("query").value = transcript;
            document.getElementById("status").innerText = "Thinking...";
            ask(); // auto-send
        };

        async function ask() {
            const query = document.getElementById("query").value;

            document.getElementById("userText").innerText = query;
            document.getElementById("responseText").innerText = "Thinking...";

            const res = await fetch("http://127.0.0.1:8000/ask", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ query: query })
            });

            const data = await res.json();

            document.getElementById("responseText").innerText = data.response;
            document.getElementById("status").innerText = "🔊 Speaking...";
            speak(data.response);
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "en-US";

            utterance.onend = () => {
                document.getElementById("status").innerText = "Idle";
            };

            // Optional: pick a nicer voice
            const voices = speechSynthesis.getVoices();
            const preferred = voices.find(v => v.lang === "en-US");
            if (preferred) {
                utterance.voice = preferred;
            }

            speechSynthesis.speak(utterance);
        }
    </script>
